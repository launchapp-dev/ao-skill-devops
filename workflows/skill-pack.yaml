phases:
  ao.devops-implement:
    mode: agent
    agent: ao.devops-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  vercel-config-generate:
    mode: agent
    agent: vercel-config-agent
    directive: "Generate Vercel deployment configuration (vercel.json) based on the input specification. Creates configs for static sites, serverless functions, edge functions, and monorepos."
    capabilities:
      mutates_state: false
    input_schema:
      deployment_type:
        type: string
        enum: [static, serverless, edge, monorepo, framework]
        description: Type of Vercel deployment
      framework:
        type: string
        enum: [nextjs, nuxt, sveltekit, astro, remix, expo, nodejs, other]
        default: other
        description: Target framework for auto-configuration
      build_command:
        type: string
        description: Build command to execute
      output_directory:
        type: string
        description: Directory containing built files
      install_command:
        type: string
        description: Install command for dependencies
      regions:
        type: array
        items:
          type: string
        description: Deployment regions
      environment_variables:
        type: object
        description: Static environment variables
      secret_environment_variables:
        type: array
        items:
          type: string
        description: Secret environment variable names (use ${{ secrets.VAR }})
      routes:
        type: array
        description: Route configurations (headers, redirects, rewrites)
      functions:
        type: object
        description: Serverless function configurations

  railway-config-generate:
    mode: agent
    agent: railway-config-agent
    directive: "Generate Railway deployment configuration (railway.toml) based on the input specification. Creates configs for Docker containers, Nixpacks builds, and monorepo services."
    capabilities:
      mutates_state: false
    input_schema:
      deployment_type:
        type: string
        enum: [docker, nixpacks, buildpack, monorepo, static]
        description: Type of Railway deployment
      language:
        type: string
        enum: [nodejs, python, go, rust, deno, bun, java, ruby, php, other]
        default: other
        description: Target language/runtime
      dockerfile_path:
        type: string
        default: Dockerfile
        description: Path to Dockerfile for Docker deployments
      docker_context:
        type: string
        default: .
        description: Docker build context
      build_command:
        type: string
        description: Override build command
      start_command:
        type: string
        description: Override start command
      port:
        type: integer
        default: 3000
        description: Container port to expose
      num_replicas:
        type: integer
        default: 1
        description: Number of replicas
      healthcheck_path:
        type: string
        description: HTTP path for health checks
      healthcheck_interval:
        type: integer
        default: 30
        description: Health check interval in seconds
      healthcheck_timeout:
        type: integer
        default: 5
        description: Health check timeout in seconds
      healthcheck_retries:
        type: integer
        default: 3
        description: Health check retry count
      environment_variables:
        type: object
        description: Static environment variables
      secret_variables:
        type: array
        items:
          type: string
        description: Secret variable names (use ${{ secrets.VAR }})
      memory_limit:
        type: integer
        description: Memory limit in MB
      cpu:
        type: number
        description: CPU count
      services:
        type: array
        description: Service definitions for monorepo deployments
      nixpacks_config:
        type: string
        description: Path to nixpacks.toml config file

  dockerfile-generate:
    mode: agent
    agent: dockerfile-agent
    directive: "Generate Dockerfile based on the input specification. Creates multi-stage Dockerfiles with optimized layer caching, health checks, and security best practices."
    capabilities:
      mutates_state: false
    input_schema:
      build_type:
        type: string
        enum: [multistage, single-stage, scratch, distroless]
        default: multistage
        description: Type of Dockerfile build strategy
      language:
        type: string
        enum: [nodejs, python, go, rust, deno, bun, static, other]
        default: other
        description: Target language/runtime for base image selection
      language_version:
        type: string
        description: Specific language version
      build_command:
        type: string
        description: Build command to execute during image build
      start_command:
        type: string
        description: Command to run when container starts
      output_directory:
        type: string
        description: Directory containing build output (for static sites)
      working_directory:
        type: string
        description: Working directory in the container
      port:
        type: integer
        description: Port the application listens on
        default: 3000
      base_image:
        type: string
        description: Custom base image (overrides language preset)
      builder_image:
        type: string
        description: Builder image for multi-stage builds
      final_image:
        type: string
        description: Final stage base image
      build_arguments:
        type: object
        description: Build arguments (ARG) for the Dockerfile
      environment_variables:
        type: object
        description: Environment variables to set in the image
      secrets:
        type: array
        items:
          type: string
        description: Secret names (will use build secret mounts)
      healthcheck:
        type: object
        description: Health check configuration
      user:
        type: string
        description: Non-root user to run as
      labels:
        type: object
        description: Labels to add to the image
      copy_files:
        type: array
        description: Files/directories to copy into the image
      optimize_cache:
        type: boolean
        default: true
        description: Enable layer caching optimization
      minimize_layers:
        type: boolean
        default: true
        description: Minimize number of layers in final image
      options:
        type: object
        description: Additional generation options

  docker-compose-generate:
    mode: agent
    agent: docker-compose-agent
    directive: "Generate docker-compose.yml based on the input specification. Creates multi-service orchestration with networks, volumes, environment variables, and health checks."
    capabilities:
      mutates_state: false
    input_schema:
      compose_version:
        type: string
        default: "3.8"
        description: Docker Compose file version
      services:
        type: array
        description: List of services to define
        required: true
        items:
          type: object
          properties:
            name:
              type: string
              description: Service name
              required: true
            image:
              type: string
              description: Docker image to use
            build:
              type: object
              description: Build configuration
            ports:
              type: array
              items:
                type: string
              description: Port mappings
            environment:
              type: object
              description: Environment variables
            env_file:
              type: string
              description: Path to environment file
            volumes:
              type: array
              items:
                type: string
              description: Volume mounts
            networks:
              type: array
              items:
                type: string
              description: Network names
            depends_on:
              type: array
              items:
                type: string
              description: Service dependencies
            healthcheck:
              type: object
              description: Health check configuration
            restart:
              type: string
              default: "unless-stopped"
              enum: ["no", "always", "on-failure", "unless-stopped"]
            command:
              type: string
              description: Override default command
            logging:
              type: object
              description: Logging configuration
      networks:
        type: array
        description: Network definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            driver:
              type: string
              default: "bridge"
      volumes:
        type: array
        description: Volume definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            driver:
              type: string
              default: "local"
      secrets:
        type: array
        description: Secret definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            file:
              type: string
      configs:
        type: array
        description: Config definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            file:
              type: string

  agent-base-framework-generate:
    mode: agent
    agent: agent-base-framework-agent
    directive: "Generate base classes and utilities for DevOps config generators. Creates Agent base class, PromptBuilder, TemplateRenderer, and validation helpers."
    capabilities:
      mutates_state: false
    input_schema:
      component_type:
        type: string
        enum: [agent_base, prompt_builder, template_renderer, validation_helpers, all]
        description: Type of framework component to generate
      target_language:
        type: string
        enum: [typescript, python, bash, all]
        default: typescript
        description: Target implementation language
      options:
        type: object
        description: Additional framework configuration options

  k8s-manifest-generate:
    mode: agent
    agent: k8s-manifest-agent
    directive: "Generate Kubernetes manifests based on input specification. Create deployment, service, ingress, configmap, secret, or PVC manifests as requested."
    capabilities:
      mutates_state: false
    input_schema:
      manifest_type:
        type: string
        enum: [deployment, service, ingress, configmap, secret, pvc, helm, kustomize]
        description: Type of Kubernetes resource to generate
      name:
        type: string
        description: Resource name
      namespace:
        type: string
        default: default
        description: Target namespace
      spec:
        type: object
        description: Resource-specific specification
      options:
        type: object
        description: Additional generation options

  github-actions-generate:
    mode: agent
    agent: github-actions-agent
    directive: "Generate GitHub Actions workflow YAML based on input specification. Supports Node.js, Python, and Go environments with lint/test/build steps, caching, artifacts, matrix builds, and Docker support."
    capabilities:
      mutates_state: false
    input_schema:
      environment:
        type: string
        enum: [nodejs, python, go]
        description: Build environment/language
        required: true
      workflow_type:
        type: string
        enum: [ci, cd, ci-cd]
        description: Type of workflow to generate
        default: ci
      name:
        type: string
        description: Workflow name
        required: true
      version:
        type: string
        description: Version or branch patterns
        default: main
      language_version:
        type: string
        description: Specific language version
      steps:
        type: array
        description: Pipeline steps to include
      cache:
        type: boolean
        default: true
        description: Enable dependency caching
      matrix:
        type: object
        description: Matrix configuration for parallel builds
      artifact:
        type: object
        description: Artifact configuration
      docker:
        type: object
        description: Docker build and push configuration

  integration-test:
    mode: agent
    agent: integration-tester-agent
    directive: "Run integration tests on generated DevOps configs. Validate Kubernetes YAML, test GitHub Actions workflows, verify Docker configs. Use mocks for external services when appropriate."
    capabilities:
      mutates_state: false
    input_schema:
      test_type:
        type: string
        enum: [cli, config, e2e, all]
        description: Type of integration test to run
      target_config:
        type: string
        description: Path to the generated config file to test
      test_scenario:
        type: string
        description: Specific test scenario or use case
      mock_mode:
        type: boolean
        default: true
        description: Whether to use mock services or real endpoints
      validation_level:
        type: string
        enum: [strict, moderate, lenient]
        default: moderate
        description: Validation strictness level

workflows:
  - id: ao.devops/standard
    name: "ao-skill-devops Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/base-framework
    name: "DevOps Agent Base Framework"
    description: "Generate base classes and utilities for DevOps config generators"
    phases:
      - agent-base-framework-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/quick-fix
    name: "ao-skill-devops Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr

  - id: ao.devops/k8s-manifest
    name: "Kubernetes Manifest Generator"
    description: "Generate Kubernetes manifests for deployments, services, ingress, configmaps, secrets, PVCs, Helm charts, and Kustomize overlays"
    phases:
      - k8s-manifest-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/standard-with-tests
    name: "ao-skill-devops Standard with Integration Tests"
    description: "Plan → Implement → Integration Test → Push → PR"
    phases:
      - ao.devops-implement
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/github-actions
    name: "GitHub Actions Generator"
    description: "Generate GitHub Actions workflows for CI/CD pipelines. Supports Node.js, Python, and Go with lint/test/build steps, caching, artifacts, and matrix builds."
    phases:
      - github-actions-generate
  - id: ao.devops/vercel-config
    name: "Vercel Config Generator"
    description: "Generate Vercel deployment configurations (vercel.json) for static sites, serverless functions, edge functions, and monorepos"
    phases:
      - vercel-config-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/railway-config
    name: "Railway Config Generator"
    description: "Generate Railway deployment configurations (railway.toml) for Docker containers, Nixpacks builds, and monorepo services"
    phases:
      - railway-config-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/dockerfile
    name: "Dockerfile Generator"
    description: "Generate production-ready multi-stage Dockerfiles with optimized layer caching, health checks, and security best practices"
    phases:
      - dockerfile-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review


  - id: ao.devops/docker-compose
    name: "Docker Compose Generator"
    description: "Generate docker-compose.yml files for multi-service orchestration with networks, volumes, environment variables, and health checks"
    phases:
      - docker-compose-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review
