phases:
  ao.devops-implement:
    mode: agent
    agent: ao.devops-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  agent-base-framework-generate:
    mode: agent
    agent: agent-base-framework-agent
    directive: "Generate base classes and utilities for DevOps config generators. Creates Agent base class, PromptBuilder, TemplateRenderer, and validation helpers."
    capabilities:
      mutates_state: false
    input_schema:
      component_type:
        type: string
        enum: [agent_base, prompt_builder, template_renderer, validation_helpers, all]
        description: Type of framework component to generate
      target_language:
        type: string
        enum: [typescript, python, bash, all]
        default: typescript
        description: Target implementation language
      options:
        type: object
        description: Additional framework configuration options

  k8s-manifest-generate:
    mode: agent
    agent: k8s-manifest-agent
    directive: "Generate Kubernetes manifests based on input specification. Create deployment, service, ingress, configmap, secret, or PVC manifests as requested."
    capabilities:
      mutates_state: false
    input_schema:
      manifest_type:
        type: string
        enum: [deployment, service, ingress, configmap, secret, pvc, helm, kustomize]
        description: Type of Kubernetes resource to generate
      name:
        type: string
        description: Resource name
      namespace:
        type: string
        default: default
        description: Target namespace
      spec:
        type: object
        description: Resource-specific specification
      options:
        type: object
        description: Additional generation options

  integration-test:
    mode: agent
    agent: integration-tester-agent
    directive: "Run integration tests on generated DevOps configs. Validate Kubernetes YAML, test GitHub Actions workflows, verify Docker configs. Use mocks for external services when appropriate."
    capabilities:
      mutates_state: false
    input_schema:
      test_type:
        type: string
        enum: [cli, config, e2e, all]
        description: Type of integration test to run
      target_config:
        type: string
        description: Path to the generated config file to test
      test_scenario:
        type: string
        description: Specific test scenario or use case
      mock_mode:
        type: boolean
        default: true
        description: Whether to use mock services or real endpoints
      validation_level:
        type: string
        enum: [strict, moderate, lenient]
        default: moderate
        description: Validation strictness level

workflows:
  - id: ao.devops/standard
    name: "ao-skill-devops Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/base-framework
    name: "DevOps Agent Base Framework"
    description: "Generate base classes and utilities for DevOps config generators"
    phases:
      - agent-base-framework-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/quick-fix
    name: "ao-skill-devops Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr

  - id: ao.devops/k8s-manifest
    name: "Kubernetes Manifest Generator"
    description: "Generate Kubernetes manifests for deployments, services, ingress, configmaps, secrets, PVCs, Helm charts, and Kustomize overlays"
    phases:
      - k8s-manifest-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/standard-with-tests
    name: "ao-skill-devops Standard with Integration Tests"
    description: "Plan → Implement → Integration Test → Push → PR"
    phases:
      - ao.devops-implement
      - integration-test
      - push-branch
      - create-pr
      - pr-review
