phases:
  ao.devops-implement:
    mode: agent
    agent: ao.devops-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  self-validate:
    mode: agent
    agent: integration-tester-agent
    directive: "Run self-validation checks on the skill pack. Validate YAML/JSON/TOML schemas, check for security issues in configs, report test coverage, and verify TypeScript/YAML linting. Fail if any validation errors are found."
    capabilities:
      mutates_state: false

  vercel-config-generate:
    mode: agent
    agent: vercel-config-agent
    directive: "Generate Vercel deployment configuration (vercel.json) based on the input specification. Creates configs for static sites, serverless functions, edge functions, and monorepos."
    capabilities:
      mutates_state: false
    input_schema:
      deployment_type:
        type: string
        enum: [static, serverless, edge, monorepo, framework]
        description: Type of Vercel deployment
      framework:
        type: string
        enum: [nextjs, nuxt, sveltekit, astro, remix, expo, nodejs, other]
        default: other
        description: Target framework for auto-configuration
      build_command:
        type: string
        description: Build command to execute
      output_directory:
        type: string
        description: Directory containing built files
      install_command:
        type: string
        description: Install command for dependencies
      regions:
        type: array
        items:
          type: string
        description: Deployment regions
      environment_variables:
        type: object
        description: Static environment variables
      secret_environment_variables:
        type: array
        items:
          type: string
        description: Secret environment variable names (use ${{ secrets.VAR }})
      routes:
        type: array
        description: Route configurations (headers, redirects, rewrites)
      functions:
        type: object
        description: Serverless function configurations

  railway-config-generate:
    mode: agent
    agent: railway-config-agent
    directive: "Generate Railway deployment configuration (railway.toml) based on the input specification. Creates configs for Docker containers, Nixpacks builds, and monorepo services."
    capabilities:
      mutates_state: false
    input_schema:
      deployment_type:
        type: string
        enum: [docker, nixpacks, buildpack, monorepo, static]
        description: Type of Railway deployment
      language:
        type: string
        enum: [nodejs, python, go, rust, deno, bun, java, ruby, php, other]
        default: other
        description: Target language/runtime
      dockerfile_path:
        type: string
        default: Dockerfile
        description: Path to Dockerfile for Docker deployments
      docker_context:
        type: string
        default: .
        description: Docker build context
      build_command:
        type: string
        description: Override build command
      start_command:
        type: string
        description: Override start command
      port:
        type: integer
        default: 3000
        description: Container port to expose
      num_replicas:
        type: integer
        default: 1
        description: Number of replicas
      healthcheck_path:
        type: string
        description: HTTP path for health checks
      healthcheck_interval:
        type: integer
        default: 30
        description: Health check interval in seconds
      healthcheck_timeout:
        type: integer
        default: 5
        description: Health check timeout in seconds
      healthcheck_retries:
        type: integer
        default: 3
        description: Health check retry count
      environment_variables:
        type: object
        description: Static environment variables
      secret_variables:
        type: array
        items:
          type: string
        description: Secret variable names (use ${{ secrets.VAR }})
      memory_limit:
        type: integer
        description: Memory limit in MB
      cpu:
        type: number
        description: CPU count
      services:
        type: array
        description: Service definitions for monorepo deployments
      nixpacks_config:
        type: string
        description: Path to nixpacks.toml config file

  railway-config-test:
    mode: agent
    agent: integration-tester-agent
    directive: "Run unit tests for Railway deployment configurations. Validates TOML syntax, Docker deployments, Nixpacks builds, monorepo services, health checks, and environment variables generation."
    capabilities:
      mutates_state: false
    input_schema:
      test_type:
        type: string
        enum: [toml_validation, docker_deployments, nixpacks_builds, monorepo_services, health_checks, environment_variables, all]
        description: Type of Railway config test to run
      target_config:
        type: string
        description: Path to the generated railway.toml file to test
      generated_config:
        type: string
        description: Raw railway.toml content to validate
      test_scenario:
        type: string
        description: Specific test scenario or use case
      deployment_type:
        type: string
        enum: [docker, nixpacks, buildpack, monorepo, static, all]
        description: Deployment type to test
      validation_level:
        type: string
        enum: [strict, moderate, lenient]
        default: moderate
        description: Validation strictness level

  dockerfile-generate:
    mode: agent
    agent: dockerfile-agent
    directive: "Generate Dockerfile based on the input specification. Creates multi-stage Dockerfiles with optimized layer caching, health checks, and security best practices."
    capabilities:
      mutates_state: false
    input_schema:
      build_type:
        type: string
        enum: [multistage, single-stage, scratch, distroless]
        default: multistage
        description: Type of Dockerfile build strategy
      language:
        type: string
        enum: [nodejs, python, go, rust, deno, bun, static, other]
        default: other
        description: Target language/runtime for base image selection
      language_version:
        type: string
        description: Specific language version
      build_command:
        type: string
        description: Build command to execute during image build
      start_command:
        type: string
        description: Command to run when container starts
      output_directory:
        type: string
        description: Directory containing build output (for static sites)
      working_directory:
        type: string
        description: Working directory in the container
      port:
        type: integer
        description: Port the application listens on
        default: 3000
      base_image:
        type: string
        description: Custom base image (overrides language preset)
      builder_image:
        type: string
        description: Builder image for multi-stage builds
      final_image:
        type: string
        description: Final stage base image
      build_arguments:
        type: object
        description: Build arguments (ARG) for the Dockerfile
      environment_variables:
        type: object
        description: Environment variables to set in the image
      secrets:
        type: array
        items:
          type: string
        description: Secret names (will use build secret mounts)
      healthcheck:
        type: object
        description: Health check configuration
      user:
        type: string
        description: Non-root user to run as
      labels:
        type: object
        description: Labels to add to the image
      copy_files:
        type: array
        description: Files/directories to copy into the image
      optimize_cache:
        type: boolean
        default: true
        description: Enable layer caching optimization
      minimize_layers:
        type: boolean
        default: true
        description: Minimize number of layers in final image
      options:
        type: object
        description: Additional generation options

  docker-compose-generate:
    mode: agent
    agent: docker-compose-agent
    directive: "Generate docker-compose.yml based on the input specification. Creates multi-service orchestration with networks, volumes, environment variables, and health checks."
    capabilities:
      mutates_state: false
    input_schema:
      compose_version:
        type: string
        default: "3.8"
        description: Docker Compose file version
      services:
        type: array
        description: List of services to define
        required: true
        items:
          type: object
          properties:
            name:
              type: string
              description: Service name
              required: true
            image:
              type: string
              description: Docker image to use
            build:
              type: object
              description: Build configuration
            ports:
              type: array
              items:
                type: string
              description: Port mappings
            environment:
              type: object
              description: Environment variables
            env_file:
              type: string
              description: Path to environment file
            volumes:
              type: array
              items:
                type: string
              description: Volume mounts
            networks:
              type: array
              items:
                type: string
              description: Network names
            depends_on:
              type: array
              items:
                type: string
              description: Service dependencies
            healthcheck:
              type: object
              description: Health check configuration
            restart:
              type: string
              default: "unless-stopped"
              enum: ["no", "always", "on-failure", "unless-stopped"]
            command:
              type: string
              description: Override default command
            logging:
              type: object
              description: Logging configuration
      networks:
        type: array
        description: Network definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            driver:
              type: string
              default: "bridge"
      volumes:
        type: array
        description: Volume definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            driver:
              type: string
              default: "local"
      secrets:
        type: array
        description: Secret definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            file:
              type: string
      configs:
        type: array
        description: Config definitions
        items:
          type: object
          properties:
            name:
              type: string
              required: true
            file:
              type: string

  agent-base-framework-generate:
    mode: agent
    agent: agent-base-framework-agent
    directive: "Generate base classes and utilities for DevOps config generators. Creates Agent base class, PromptBuilder, TemplateRenderer, and validation helpers."
    capabilities:
      mutates_state: false
    input_schema:
      component_type:
        type: string
        enum: [agent_base, prompt_builder, template_renderer, validation_helpers, all]
        description: Type of framework component to generate
      target_language:
        type: string
        enum: [typescript, python, bash, all]
        default: typescript
        description: Target implementation language
      options:
        type: object
        description: Additional framework configuration options

  k8s-manifest-generate:
    mode: agent
    agent: k8s-manifest-agent
    directive: "Generate Kubernetes manifests based on input specification. Create deployment, service, ingress, configmap, secret, or PVC manifests as requested."
    capabilities:
      mutates_state: false
    input_schema:
      manifest_type:
        type: string
        enum: [deployment, service, ingress, configmap, secret, pvc, helm, kustomize]
        description: Type of Kubernetes resource to generate
      name:
        type: string
        description: Resource name
      namespace:
        type: string
        default: default
        description: Target namespace
      spec:
        type: object
        description: Resource-specific specification
      options:
        type: object
        description: Additional generation options

  github-actions-generate:
    mode: agent
    agent: github-actions-agent
    directive: "Generate GitHub Actions workflow YAML based on input specification. Supports Node.js, Python, and Go environments with lint/test/build steps, caching, artifacts, matrix builds, and Docker support."
    capabilities:
      mutates_state: false
    input_schema:
      environment:
        type: string
        enum: [nodejs, python, go]
        description: Build environment/language
        required: true
      workflow_type:
        type: string
        enum: [ci, cd, ci-cd]
        description: Type of workflow to generate
        default: ci
      name:
        type: string
        description: Workflow name
        required: true
      version:
        type: string
        description: Version or branch patterns
        default: main
      language_version:
        type: string
        description: Specific language version
      steps:
        type: array
        description: Pipeline steps to include
      cache:
        type: boolean
        default: true
        description: Enable dependency caching
      matrix:
        type: object
        description: Matrix configuration for parallel builds
      artifact:
        type: object
        description: Artifact configuration
      docker:
        type: object
        description: Docker build and push configuration

  python-ci-generate:
    mode: agent
    agent: python-ci-agent
    directive: "Generate GitHub Actions workflow YAML for Python CI with pytest, coverage reporting, and coverage threshold enforcement. Creates workflows that run tests, generate coverage reports, and enforce minimum 80% coverage."
    capabilities:
      mutates_state: false
    input_schema:
      environment:
        type: string
        enum: [python]
        description: Build environment/language
        required: true
        default: python
      name:
        type: string
        description: Workflow name
        required: true
        default: Python CI
      version:
        type: string
        description: Python version
        default: "3.11"
      package_manager:
        type: string
        enum: [pip, poetry, pipenv, pdm]
        default: pip
        description: Python package manager to use
      coverage_threshold:
        type: number
        default: 80
        description: Minimum coverage percentage threshold (0-100)
      fail_under:
        type: number
        default: 80
        description: Coverage threshold that causes job to fail if not met
      lint:
        type: boolean
        default: true
        description: Include linting step
      linter:
        type: string
        enum: [ruff, pylint, flake8, black]
        default: ruff
        description: Linter to use
      cache:
        type: boolean
        default: true
        description: Enable dependency caching
      cache_key:
        type: string
        default: pip
        description: Cache key prefix (pip, poetry, pipenv, pdm)
      pytest_args:
        type: string
        description: Additional pytest arguments
        default: "-v --tb=short"
      pytest_markers:
        type: array
        items:
          type: string
        description: Pytest markers to run (e.g., ["unit", "integration"])
      test_path:
        type: string
        default: tests
        description: Path to test directory
      src_path:
        type: string
        default: src
        description: Path to source code for coverage
      matrix:
        type: object
        description: Matrix configuration for parallel builds

  integration-test:
    mode: agent
    agent: vercel-config-test-agent
    directive: "Run unit tests for Vercel config generator. Validates vercel.json generation for static sites, serverless functions, edge functions, monorepos, route configurations, and environment variables."
    capabilities:
      mutates_state: false
    input_schema:
      test_scenario:
        type: string
        enum: [static_sites, serverless_functions, edge_functions, monorepos, route_configurations, environment_variables, framework_presets, validation_tests, edge_cases, all]
        default: all
        description: Test scenario to run
      test_case_id:
        type: string
        description: Specific test case ID to run (optional)
      validation_level:
        type: string
        enum: [strict, moderate, lenient]
        default: moderate
        description: Validation strictness level

  env-example-generate:
    mode: agent
    agent: env-example-generator-agent
    directive: "Generate .env.example file based on the input specification. Creates comprehensive environment variable documentation with type hints, descriptions, secrets handling, and framework-specific presets."
    capabilities:
      mutates_state: false
    input_schema:
      environment_type:
        type: string
        enum: [nodejs, python, go, deno, bun, ruby, php, java, rust, docker, kubernetes, generic]
        default: generic
        description: Target environment/framework type
      project_name:
        type: string
        description: Project name for context and comments
      variables:
        type: array
        description: List of environment variables to document
        items:
          type: object
          properties:
            name:
              type: string
              description: Variable name (e.g., DATABASE_URL)
              required: true
            description:
              type: string
              description: Human-readable description of the variable
            type:
              type: string
              enum: [string, number, boolean, url, path, email, port, secret, array]
              default: string
              description: Variable type for documentation hints
            default_value:
              type: string
              description: Default value
            required:
              type: boolean
              default: false
              description: Whether the variable is required
            secret:
              type: boolean
              default: false
              description: Whether the variable contains sensitive data
            example:
              type: string
              description: Example value for documentation
            validation:
              type: string
              description: Validation hint or pattern
            allowed_values:
              type: array
              items:
                type: string
              description: For enum-like variables, list allowed values
      framework_presets:
        type: object
        description: Pre-configured environment variables for common frameworks
        properties:
          database:
            type: boolean
            default: false
            description: Include database connection variables
          cache:
            type: boolean
            default: false
            description: Include cache connection variables
          auth:
            type: boolean
            default: false
            description: Include authentication variables
          storage:
            type: boolean
            default: false
            description: Include storage/S3 variables
          email:
            type: boolean
            default: false
            description: Include email service variables
          monitoring:
            type: boolean
            default: false
            description: Include monitoring/logging variables
          queue:
            type: boolean
            default: false
            description: Include message queue variables
      split_secrets:
        type: boolean
        default: true
        description: Separate secrets into a distinct section
      include_validation:
        type: boolean
        default: true
        description: Include validation hints and type annotations
      include_comments:
        type: boolean
        default: true
        description: Include descriptive comments
      format:
        type: string
        enum: [env, json, yaml, toml]
        default: env
        description: Output format for the generated file

  cli-generator-generate:
    mode: agent
    agent: cli-generator-interface-agent
    directive: "Generate CLI interface for invoking DevOps generators. Creates a unified command-line interface with subcommands for GitHub Actions, Dockerfile, docker-compose, Vercel, Railway, Kubernetes, and .env generators. Supports interactive and non-interactive modes with JSON/YAML input."
    capabilities:
      mutates_state: false
    input_schema:
      subcommand:
        type: string
        enum: [github-actions, dockerfile, docker-compose, vercel, railway, kubernetes, env, python-ci, all]
        description: Generator subcommand to invoke
        required: true
      interactive:
        type: boolean
        default: false
        description: Enable interactive mode with prompts
      non_interactive:
        type: boolean
        default: true
        description: Disable interactive mode
      output:
        type: string
        description: Output file path
      format:
        type: string
        enum: [json, yaml, yml, toml, env, text]
        default: yaml
        description: Output format
      dry_run:
        type: boolean
        default: false
        description: Show what would be generated without writing files
      verbose:
        type: boolean
        default: false
        description: Enable verbose output
      quiet:
        type: boolean
        default: false
        description: Suppress non-essential output
      input_file:
        type: string
        description: Input file path (JSON or YAML)
      json_input:
        type: string
        description: JSON input string
      yaml_input:
        type: string
        description: YAML input string
      config_file:
        type: string
        description: Path to config file
      preset:
        type: string
        description: Use a predefined preset configuration
      template:
        type: string
        description: Use a custom template
      stack:
        type: string
        description: Technology stack preset (e.g., nodejs-postgres)
      generator_options:
        type: object
        description: Options to pass to the underlying generator
        properties:
          environment:
            type: string
            description: Target language/runtime
          name:
            type: string
            description: Configuration name
          language_version:
            type: string
            description: Specific language version
          framework:
            type: string
            description: Target framework
          build_type:
            type: string
            description: Dockerfile build strategy
          deployment_type:
            type: string
            description: Deployment type
          manifest_type:
            type: string
            description: Kubernetes manifest type
          services:
            type: array
            items:
              type: string
            description: Services to include
          port:
            type: integer
            description: Application port
          healthcheck:
            type: boolean
            description: Enable health checks
          cache:
            type: boolean
            description: Enable caching

workflows:
  - id: ao.devops/standard
    name: "ao-skill-devops Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/base-framework
    name: "DevOps Agent Base Framework"
    description: "Generate base classes and utilities for DevOps config generators"
    phases:
      - agent-base-framework-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/quick-fix
    name: "ao-skill-devops Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr

  - id: ao.devops/k8s-manifest
    name: "Kubernetes Manifest Generator"
    description: "Generate Kubernetes manifests for deployments, services, ingress, configmaps, secrets, PVCs, Helm charts, and Kustomize overlays"
    phases:
      - k8s-manifest-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/standard-with-tests
    name: "ao-skill-devops Standard with Integration Tests"
    description: "Plan → Implement → Integration Test → Push → PR"
    phases:
      - ao.devops-implement
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/github-actions
    name: "GitHub Actions Generator"
    description: "Generate GitHub Actions workflows for CI/CD pipelines. Supports Node.js, Python, and Go with lint/test/build steps, caching, artifacts, and matrix builds."
    phases:
      - github-actions-generate

  - id: ao.devops/python-ci
    name: "Python CI Generator"
    description: "Generate GitHub Actions workflows for Python CI with pytest, coverage reporting, and 80% coverage threshold enforcement. Creates workflows for testing Python projects with comprehensive coverage requirements."
    phases:
      - python-ci-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/vercel-config
    name: "Vercel Config Generator"
    description: "Generate Vercel deployment configurations (vercel.json) for static sites, serverless functions, edge functions, and monorepos"
    phases:
      - vercel-config-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/vercel-config-with-tests
    name: "Vercel Config Generator with Unit Tests"
    description: "Generate Vercel deployment configurations and run comprehensive unit tests covering all deployment types"
    phases:
      - vercel-config-generate
      - vercel-config-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/vercel-config-unit-tests
    name: "Vercel Config Unit Tests"
    description: "Run unit tests for Vercel config generator. Validates vercel.json generation for all supported deployment types and configurations."
    phases:
      - vercel-config-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/railway-config
    name: "Railway Config Generator"
    description: "Generate Railway deployment configurations (railway.toml) for Docker containers, Nixpacks builds, and monorepo services"
    phases:
      - railway-config-generate
      - railway-config-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/dockerfile
    name: "Dockerfile Generator"
    description: "Generate production-ready multi-stage Dockerfiles with optimized layer caching, health checks, and security best practices"
    phases:
      - dockerfile-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review


  - id: ao.devops/docker-compose
    name: "Docker Compose Generator"
    description: "Generate docker-compose.yml files for multi-service orchestration with networks, volumes, environment variables, and health checks"
    phases:
      - docker-compose-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/env-example
    name: "Environment Example Generator"
    description: "Generate comprehensive .env.example files with documented environment variables, type hints, descriptions, and proper secrets handling. Supports Node.js, Python, Go, and other frameworks."
    phases:
      - env-example-generate
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/env-example-with-tests
    name: "Environment Example Generator with Tests"
    description: "Generate .env.example files and run validation tests to ensure proper format and documentation"
    phases:
      - env-example-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/cli-generator
    name: "CLI Generator Interface"
    description: "Generate CLI interface for invoking DevOps generators. Provides unified command-line interface with subcommands for GitHub Actions, Dockerfile, docker-compose, Vercel, Railway, Kubernetes, and .env generators. Supports interactive and non-interactive modes with JSON/YAML input."
    phases:
      - cli-generator-generate
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/cli-generator-full
    name: "CLI Generator with All Configs"
    description: "Generate CLI interface and all DevOps configurations (GitHub Actions, Dockerfile, docker-compose, Kubernetes, env) for a complete DevOps setup."
    phases:
      - cli-generator-generate
      - github-actions-generate
      - dockerfile-generate
      - docker-compose-generate
      - k8s-manifest-generate
      - env-example-generate
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/self-validation
    name: "Skill Pack Self-Validation"
    description: "GitHub Actions CI workflow that validates all generated DevOps configs in the skill pack. Runs schema validation, security checks, test coverage, and TypeScript/YAML linting. Triggers on PR and push events."
    phases:
      - self-validate
