phases:
  ao.devops-implement:
    mode: agent
    agent: ao.devops-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  k8s-manifest-generate:
    mode: agent
    agent: k8s-manifest-agent
    directive: "Generate Kubernetes manifests based on input specification. Create deployment, service, ingress, configmap, secret, or PVC manifests as requested."
    capabilities:
      mutates_state: false
    input_schema:
      manifest_type:
        type: string
        enum: [deployment, service, ingress, configmap, secret, pvc, helm, kustomize]
        description: Type of Kubernetes resource to generate
      name:
        type: string
        description: Resource name
      namespace:
        type: string
        default: default
        description: Target namespace
      spec:
        type: object
        description: Resource-specific specification
      options:
        type: object
        description: Additional generation options

  github-actions-generate:
    mode: agent
    agent: github-actions-agent
    directive: "Generate GitHub Actions workflow YAML based on input specification. Supports Node.js, Python, and Go environments with lint/test/build steps, caching, artifacts, matrix builds, and Docker support."
    capabilities:
      mutates_state: false
    input_schema:
      environment:
        type: string
        enum: [nodejs, python, go]
        description: Build environment/language
        required: true
      workflow_type:
        type: string
        enum: [ci, cd, ci-cd]
        description: Type of workflow to generate
        default: ci
      name:
        type: string
        description: Workflow name
        required: true
      version:
        type: string
        description: Version or branch patterns
        default: main
      language_version:
        type: string
        description: Specific language version
      steps:
        type: array
        description: Pipeline steps to include
      cache:
        type: boolean
        default: true
        description: Enable dependency caching
      matrix:
        type: object
        description: Matrix configuration for parallel builds
      artifact:
        type: object
        description: Artifact configuration
      docker:
        type: object
        description: Docker build and push configuration

  integration-test:
    mode: agent
    agent: integration-tester-agent
    directive: "Run integration tests on generated DevOps configs. Validate Kubernetes YAML, test GitHub Actions workflows, verify Docker configs. Use mocks for external services when appropriate."
    capabilities:
      mutates_state: false
    input_schema:
      test_type:
        type: string
        enum: [cli, config, e2e, all]
        description: Type of integration test to run
      target_config:
        type: string
        description: Path to the generated config file to test
      test_scenario:
        type: string
        description: Specific test scenario or use case
      mock_mode:
        type: boolean
        default: true
        description: Whether to use mock services or real endpoints
      validation_level:
        type: string
        enum: [strict, moderate, lenient]
        default: moderate
        description: Validation strictness level

workflows:
  - id: ao.devops/standard
    name: "ao-skill-devops Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/quick-fix
    name: "ao-skill-devops Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.devops-implement
      - push-branch
      - create-pr

  - id: ao.devops/k8s-manifest
    name: "Kubernetes Manifest Generator"
    description: "Generate Kubernetes manifests for deployments, services, ingress, configmaps, secrets, PVCs, Helm charts, and Kustomize overlays"
    phases:
      - k8s-manifest-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/standard-with-tests
    name: "ao-skill-devops Standard with Integration Tests"
    description: "Plan → Implement → Integration Test → Push → PR"
    phases:
      - ao.devops-implement
      - integration-test
      - push-branch
      - create-pr
      - pr-review

  - id: ao.devops/github-actions
    name: "GitHub Actions Generator"
    description: "Generate GitHub Actions workflows for CI/CD pipelines. Supports Node.js, Python, and Go with lint/test/build steps, caching, artifacts, and matrix builds."
    phases:
      - github-actions-generate
      - integration-test
      - push-branch
      - create-pr
      - pr-review
