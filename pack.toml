schema = "ao.pack.v1"
id = "ao.devops"
version = "0.1.0"
kind = "skill-pack"
title = "ao-skill-devops"
description = "Generate GitHub Actions, Dockerfiles, Kubernetes manifests, and deployment configs automatically"

[ownership]
mode = "community"
author = "launchapp-dev"
repo = "https://github.com/launchapp-dev/ao-skill-devops"

[compatibility]
ao_core = ">=0.2.0"
workflow_schema = "v2"

[workflows]
root = "workflows"
exports = [
  "ao.devops/standard",
  "ao.devops/quick-fix",
  "ao.devops/k8s-manifest",
  "ao.devops/standard-with-tests",
  "ao.devops/github-actions",
  "ao.devops/base-framework",
  "ao.devops/vercel-config",
  "ao.devops/vercel-config-with-tests",
  "ao.devops/vercel-config-unit-tests",
  "ao.devops/railway-config",
  "ao.devops/dockerfile",
  "ao.devops/docker-compose",
]

[skills]
exports = [
  "ao.devops/agent-base-framework",
  "ao.devops/k8s-manifest-generator",
  "ao.devops/integration-tester",
  "ao.devops/github-actions-generator",
  "ao.devops/vercel-config-generator",
  "ao.devops/vercel-config-generator-tests",
  "ao.devops/railway-config-generator",
  "ao.devops/railway-config-tester",
  "ao.devops/dockerfile-generator",
  "ao.devops/docker-compose-generator",
]

[runtime]
agent_overlay = "runtime/agents.yaml"

[permissions]
tools = ["ao", "github"]
