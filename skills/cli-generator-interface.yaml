id: ao.devops/cli-generator-interface
description: "CLI interface for invoking DevOps generators. Provides unified command-line interface with subcommands for GitHub Actions, Dockerfile, docker-compose, Vercel, Railway, Kubernetes, and .env generators. Supports interactive and non-interactive modes with JSON/YAML input."
version: "0.1.0"

agent: cli-generator-interface-agent

subcommands:
  - id: github-actions
    aliases: [gh-actions, gha]
    description: "Generate GitHub Actions workflows"
    generator_skill: ao.devops/github-actions-generator
  
  - id: dockerfile
    aliases: [docker]
    description: "Generate Dockerfiles"
    generator_skill: ao.devops/dockerfile-generator
  
  - id: docker-compose
    aliases: [compose, dc]
    description: "Generate docker-compose.yml files"
    generator_skill: ao.devops/docker-compose-generator
  
  - id: vercel
    aliases: [vercel-config]
    description: "Generate Vercel deployment configurations"
    generator_skill: ao.devops/vercel-config-generator
  
  - id: railway
    aliases: [railway-config]
    description: "Generate Railway deployment configurations"
    generator_skill: ao.devops/railway-config-generator
  
  - id: kubernetes
    aliases: [k8s, k8]
    description: "Generate Kubernetes manifests"
    generator_skill: ao.devops/k8s-manifest-generator
  
  - id: env
    aliases: [env-example, dotenv, env-example-generator]
    description: "Generate .env.example files"
    generator_skill: ao.devops/env-example-generator
  
  - id: python-ci
    aliases: [python, pyci]
    description: "Generate Python CI workflows with pytest and coverage"
    generator_skill: ao.devops/python-ci-generator
  
  - id: all
    aliases: [generate-all, fullstack]
    description: "Generate all configurations at once"
    requires_preset: true

features:
  - interactive_mode
  - non_interactive_mode
  - json_input
  - yaml_input
  - global_flags
  - shell_completion
  - dry_run_mode
  - config_files
  - output_redirection
  - presets
  - templates

input_schema:
  subcommand:
    type: string
    enum: [github-actions, dockerfile, docker-compose, vercel, railway, kubernetes, env, python-ci, all]
    description: Generator subcommand to invoke
    required: true
    aliases:
      github-actions: [gh-actions, gha, github]
      dockerfile: [docker, df]
      docker-compose: [compose, dc]
      vercel: [vercel-config, vc]
      railway: [railway-config, rc]
      kubernetes: [k8s, k8, k]
      env: [env-example, dotenv, envfile]
      python-ci: [python, pyci, py]
      all: [generate-all, fullstack, generate]
  
  # Global flags
  help:
    type: boolean
    aliases: [-h, --help]
    description: Show help for command
  
  version:
    type: boolean
    aliases: [-v, --version, -V]
    description: Show version information
  
  interactive:
    type: boolean
    aliases: [-i, --interactive]
    description: Force interactive mode
  
  non_interactive:
    type: boolean
    aliases: [--non-interactive, --no-interactive, -n]
    description: Disable interactive mode
  
  output:
    type: string
    aliases: [-o, --output]
    description: Output file path
  
  format:
    type: string
    enum: [json, yaml, yml, toml, env, text]
    default: yaml
    description: Output format
  
  dry_run:
    type: boolean
    aliases: [--dry-run, -n, --check]
    description: Show what would be generated without writing files
  
  verbose:
    type: boolean
    aliases: [-vv, --verbose]
    description: Enable verbose output
  
  quiet:
    type: boolean
    aliases: [-q, --quiet, --silent]
    description: Suppress non-essential output
  
  config:
    type: string
    aliases: [-c, --config, --cfg]
    description: Path to config file
  
  no_input:
    type: boolean
    aliases: [--no-input, -y, --yes]
    description: Skip all prompts (fail on missing required options)
  
  # JSON/YAML input
  input_file:
    type: string
    aliases: [--input, -i, --file, -f]
    description: Input file path (JSON or YAML)
  
  json_input:
    type: string
    aliases: [--json, --json-input]
    description: JSON input string (use '-' for stdin)
  
  yaml_input:
    type: string
    aliases: [--yaml, --yaml-input, -y]
    description: YAML input string (use '-' for stdin)
  
  stdin:
    type: boolean
    aliases: [--from-stdin]
    description: Read input from stdin
  
  # Generator-specific options
  environment:
    type: string
    enum: [nodejs, python, go, deno, bun, ruby, php, java, rust, static, other]
    aliases: [-e, --environment, --env, --runtime]
    description: Target language/runtime
  
  name:
    type: string
    aliases: [-n, --name]
    description: Configuration name
  
  language:
    type: string
    aliases: [-l, --language, --lang]
    description: Alias for environment
  
  language_version:
    type: string
    aliases: [--version, -V]
    description: Specific language version
  
  framework:
    type: string
    aliases: [-f, --framework, --fw]
    description: Target framework (e.g., nextjs, django, fastapi)
  
  build_type:
    type: string
    enum: [multistage, single-stage, scratch, distroless]
    default: multistage
    aliases: [--build-type, --build]
    description: Dockerfile build strategy
  
  deployment_type:
    type: string
    enum: [static, serverless, edge, monorepo, docker, nixpacks, buildpack]
    aliases: [--deployment, --type, -t]
    description: Deployment type
  
  manifest_type:
    type: string
    enum: [deployment, service, ingress, configmap, secret, pvc, helm, kustomize]
    aliases: [--manifest, -m]
    description: Kubernetes manifest type
  
  # Presets
  preset:
    type: string
    aliases: [-p, --preset]
    description: Use a predefined preset configuration
  
  template:
    type: string
    aliases: [-t, --template]
    description: Use a custom template
  
  stack:
    type: string
    description: Technology stack preset (e.g., nodejs-postgres, python-redis)
  
  # Additional options
  services:
    type: array
    items:
      type: string
    aliases: [--services, --service, -s]
    description: Services to include
  
  port:
    type: integer
    aliases: [-p, --port]
    description: Application port number
  
  healthcheck:
    type: boolean
    aliases: [--healthcheck, --hc]
    description: Enable health checks
  
  cache:
    type: boolean
    aliases: [--cache, --no-cache]
    description: Enable dependency caching
  
  stdout:
    type: boolean
    aliases: [--stdout, -]
    description: Output to stdout instead of file

output_mappings:
  github-actions:
    default_path: .github/workflows
    extensions: [yml, yaml]
  
  dockerfile:
    default_path: Dockerfile
    extensions: []
  
  docker-compose:
    default_path: docker-compose.yml
    extensions: [yml, yaml]
  
  vercel:
    default_path: vercel.json
    extensions: [json]
  
  railway:
    default_path: railway.toml
    extensions: [toml]
  
  kubernetes:
    default_path: k8s
    extensions: [yml, yaml]
  
  env:
    default_path: .env.example
    extensions: [env, example]
  
  python-ci:
    default_path: .github/workflows/python-ci.yml
    extensions: [yml, yaml]

presets:
  nodejs:
    environment: nodejs
    services: [api]
  
  python:
    environment: python
    services: [api]
  
  go:
    environment: go
    services: [api]
  
  nodejs-postgres:
    environment: nodejs
    services: [api, postgres, redis]
    preset: fullstack
  
  python-postgres:
    environment: python
    services: [api, postgres, redis]
    preset: fullstack
  
  fullstack:
    github-actions: true
    dockerfile: true
    docker-compose: true
    vercel: false
    railway: false
    kubernetes: false
    env: true
  
  microservices:
    github-actions: true
    dockerfile: true
    docker-compose: true
    kubernetes: true
    env: true

config_file_locations:
  - .ao-devops.yaml
  - .ao-devops.yml
  - .ao-devops.json
  - .ao-devops.toml
  - ~/.ao-devops.yaml
  - ~/.config/ao-devops/config.yaml
  - /etc/ao-devops/config.yaml

capabilities:
  cli_generation: true
  interactive_mode: true
  non_interactive_mode: true
  json_input: true
  yaml_input: true
  global_flags: true
  shell_completion: true
  dry_run_mode: true
  config_files: true
  output_redirection: true
  presets: true
  templates: true
  subcommands: true

examples:
  github_actions_basic: |
    ao-devops github-actions --environment nodejs --name "My CI"

  github_actions_with_cache: |
    ao-devops gh-actions -e python -n "Python CI" --cache

  github_actions_json_input: |
    echo '{"environment":"nodejs","name":"Node CI"}' | ao-devops github-actions --json -

  dockerfile_basic: |
    ao-devops dockerfile --language nodejs --multistage

  dockerfile_with_healthcheck: |
    ao-devops docker --lang python --healthcheck --port 8000

  docker_compose_services: |
    ao-devops docker-compose --services api,db,redis --output docker-compose.yml

  vercel_serverless: |
    ao-devops vercel --type serverless --framework nextjs

  railway_docker: |
    ao-devops railway --type docker --port 3000

  kubernetes_deployment: |
    ao-devops kubernetes --manifest deployment --name myapp --port 8080

  env_with_presets: |
    ao-devops env --framework nodejs --database --auth --storage

  python_ci_with_coverage: |
    ao-devops python-ci --framework fastapi --coverage 80

  all_fullstack: |
    ao-devops all --stack nodejs-postgres --preset fullstack

  interactive_mode: |
    ao-devops --interactive
    # Shows menu:
    # > Select generator:
    #   1. GitHub Actions
    #   2. Dockerfile
    #   3. docker-compose
    #   ...

  dry_run: |
    ao-devops github-actions --environment nodejs --dry-run --stdout

  config_file: |
    # .ao-devops.yaml
    default_environment: nodejs
    output_dir: ./config
    github_actions:
      name: "My Workflow"
      cache: true
    
    # Command
    ao-devops github-actions --config .ao-devops.yaml

  shell_completion: |
    # bash
    eval "$(ao-devops --completion bash)"
    
    # zsh
    eval "$(ao-devops --completion zsh)"
    
    # fish
    ao-devops --completion fish | source

  piped_output: |
    ao-devops dockerfile --language nodejs --format json | jq '.FROM'
